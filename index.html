<!DOCTYPE html>
<html>
<head>
  <title>Web Emulator</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #game {
      width: 100%;
      height: 75vh;
      margin-top: 20px;
    }

    button {
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      background: #00c3ff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Web Emulator</h1>

<button onclick="document.getElementById('file').click()">Load Game</button>
<button onclick="toggleFS()">Fullscreen</button>

<input type="file" id="file" hidden>

<div id="game">
  <iframe id="frame" style="width:100%;height:100%;border:none;"></iframe>
</div>

<script>
const fileInput = document.getElementById("file");
const frame = document.getElementById("frame");

fileInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  // WebRetro loader URL (stable hosted frontend)
  frame.src =
    "https://binbashbanana.github.io/webretro/?core=n64&rom=" +
    encodeURIComponent(url);
});

function toggleFS() {
  const el = document.getElementById("game");
  if (!document.fullscreenElement) {
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
